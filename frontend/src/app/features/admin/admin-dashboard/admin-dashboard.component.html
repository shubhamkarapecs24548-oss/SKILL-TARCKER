<div class="fade-in-up pb-10">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 flex items-center">
        🛡️ Platform Administration
      </h1>
      <p class="text-gray-600 dark:text-gray-400 mt-1">Platform-wide analytics and management</p>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-caramel-500"></div>
  </div>

  <div *ngIf="!loading && stats" class="space-y-8">
    
    <!-- Row 1: Key Stats -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      <app-stats-card title="Total Registered Users" [value]="stats.totalUsers" icon="👥" color="text-blue-600"></app-stats-card>
      <app-stats-card title="Skills Across Platform" [value]="stats.totalSkills" icon="🎯" color="text-caramel-600"></app-stats-card>
      <app-stats-card title="Total Completed Skills" [value]="stats.completedSkills" icon="✅" color="text-green-600"></app-stats-card>
      <app-stats-card title="Completion Rate" [value]="((stats.completedSkills / stats.totalSkills) * 100).toFixed(1) + '%'" icon="📈" color="text-orange-600"></app-stats-card>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
      
      <!-- User List Quick View (Placeholder for actual User List logic) -->
      <div class="card p-6">
        <h3 class="text-xl font-bold mb-4 flex justify-between items-center">
            User Management
            <button class="btn-primary text-xs" routerLink="/admin/users">Manage Users</button>
        </h3>
        <p class="text-sm text-gray-500 mb-6 italic">This section allows admins to moderate users and toggle permission levels.</p>
        <div class="text-center py-10 border-2 border-dashed border-gray-100 dark:border-dark-border rounded-xl">
            <span class="text-4xl">🔐</span>
            <p class="mt-2 text-gray-600">Feature Ready to Scale</p>
        </div>
      </div>

      <!-- Category Distribution -->
      <div class="card p-6">
        <h3 class="text-xl font-bold mb-4">Category Engagement</h3>
        <div class="space-y-3">
          <div *ngFor="let cat of stats.skillsByCategory" class="flex items-center">
             <span class="w-32 text-sm font-bold truncate text-gray-700 dark:text-gray-300">{{ cat._id || 'Uncategorized' }}</span>
             <div class="flex-grow mx-4 relative h-3 bg-gray-100 dark:bg-dark-border rounded-full overflow-hidden">
               <div class="absolute h-full bg-caramel-400 rounded-full" [style.width.%]="(cat.count / stats.totalSkills) * 100"></div>
             </div>
             <span class="w-10 text-right text-xs font-black text-caramel-500">{{ cat.count }}</span>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
