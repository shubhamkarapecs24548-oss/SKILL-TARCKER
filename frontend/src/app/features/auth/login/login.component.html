<div class="min-h-[80vh] flex items-center justify-center bg-caramel-100 dark:bg-dark-bg py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 card p-8 fade-in-up">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 dark:text-gray-100">
        Welcome back
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
        Log in to continue tracking your skills
      </p>
    </div>
    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      
      <div *ngIf="error" class="bg-red-50 border-l-4 border-red-400 p-4 mb-4 rounded-r-lg">
        <p class="text-sm text-red-700">{{error}}</p>
      </div>

      <div class="rounded-md space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email address</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required [(ngModel)]="formData.email"
            class="input-field shadow-sm" placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required [(ngModel)]="formData.password"
            class="input-field shadow-sm" placeholder="••••••••">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-caramel-600 focus:ring-caramel-500 border-gray-300 rounded">
          <label for="remember-me" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">
            Remember me
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-caramel-600 hover:text-caramel-500">
            Forgot your password?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loading || !loginForm.form.valid"
          class="group relative w-full flex justify-center py-3 px-4 btn-primary disabled:opacity-70 disabled:cursor-not-allowed">
          <span *ngIf="loading" class="mr-2">...</span>
          Sign in
        </button>
      </div>

      <div class="text-sm text-center">
        <span class="text-gray-600 dark:text-gray-400">Don't have an account? </span>
        <a routerLink="/register" class="font-medium text-caramel-600 hover:text-caramel-500">Sign up</a>
      </div>
    </form>
  </div>
</div>
