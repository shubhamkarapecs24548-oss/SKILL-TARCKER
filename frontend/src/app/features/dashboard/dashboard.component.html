<div class="fade-in-up">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">Dashboard</h1>
      <p class="text-gray-600 dark:text-gray-400 mt-1">Track your learning journey</p>
    </div>
    <div class="flex space-x-3">
      <button routerLink="/skills/new" class="btn-primary flex items-center shadow-md">
        <span class="mr-2">+</span> Add Skill
      </button>
    </div>
  </div>

  <!-- Stats row -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <app-stats-card title="Total Skills" [value]="totalSkills" icon="📚" bgColor="bg-blue-500"></app-stats-card>
    <app-stats-card title="In Progress" [value]="inProgressSkills" icon="⏳" bgColor="bg-caramel-400"></app-stats-card>
    <app-stats-card title="Completed" [value]="completedSkills" icon="✅" bgColor="bg-green-500"></app-stats-card>
    <app-stats-card title="Current Streak" [value]="streak + ' Days'" icon="🔥" bgColor="bg-red-500"></app-stats-card>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Main Chart Section -->
    <div class="lg:col-span-2 card p-6">
      <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center">
        Weekly Activity
      </h2>
      <div class="h-80 w-full">
        <canvas baseChart
          [data]="chartData"
          [options]="chartOptions"
          [type]="'bar'">
        </canvas>
      </div>
    </div>

    <!-- Recent Activity / Goals -->
    <div class="card p-6 flex flex-col">
      <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-6">Recent Skills</h2>
      
      <div class="flex-1 overflow-y-auto pr-2 space-y-4">
        <div *ngIf="skills.length === 0" class="text-center text-gray-500 dark:text-gray-400 py-8">
          No skills added yet. start learning!
        </div>

        <div *ngFor="let skill of skills | slice:0:5" class="p-4 rounded-xl border border-gray-100 dark:border-dark-border hover:shadow-md transition cursor-pointer" [routerLink]="['/skills', skill._id]">
          <div class="flex justify-between items-start mb-2">
            <div>
              <h4 class="font-semibold text-gray-800 dark:text-gray-200">{{skill.name}}</h4>
              <span class="text-xs px-2 py-1 rounded-full bg-caramel-100 text-caramel-700 font-medium">{{skill.category}}</span>
            </div>
            <span class="text-sm font-bold text-caramel-600">{{skill.progress}}%</span>
          </div>
          <div class="w-full bg-gray-200 dark:bg-dark-border rounded-full h-2 mt-3">
            <div class="bg-caramel-400 h-2 rounded-full" [style.width.%]="skill.progress"></div>
          </div>
        </div>
      </div>
      
      <div class="mt-4 pt-4 border-t border-gray-100 dark:border-dark-border text-center">
        <a routerLink="/skills" class="text-caramel-600 hover:text-caramel-700 text-sm font-medium">View All Skills →</a>
      </div>
    </div>
  </div>
</div>
