<div class="fade-in-up">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">My Skills</h1>
      <p class="text-gray-600 dark:text-gray-400 mt-1">Manage and track your technical skills</p>
    </div>
    <button (click)="router.navigate(['/skills/new'])" class="btn-primary flex items-center shadow-md">
      <span class="mr-2">+</span> Add Skill
    </button>
  </div>

  <div class="card p-5 mb-8">
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
      
      <!-- Search Input -->
      <div class="w-full md:w-1/3 relative">
        <input type="text" class="input-field pl-10 w-full" placeholder="Search skills..." (input)="onSearch($event)">
        <svg class="w-5 h-5 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      
      <div class="flex flex-wrap gap-3 items-center w-full md:w-auto">
        <select class="input-field py-2 bg-white w-auto min-w-[140px]" [(ngModel)]="filters.level" (change)="loadSkills()">
          <option value="">All Levels</option>
          <option *ngFor="let lvl of levels" [value]="lvl">{{lvl}}</option>
        </select>
        
        <select class="input-field py-2 bg-white w-auto min-w-[140px]" [(ngModel)]="filters.status" (change)="loadSkills()">
          <option value="">All Statuses</option>
          <option *ngFor="let s of statuses" [value]="s">{{s}}</option>
        </select>
        
        <select class="input-field py-2 bg-white w-auto min-w-[140px]" [(ngModel)]="filters.sortBy" (change)="loadSkills()">
          <option value="createdAt">Date added</option>
          <option value="name">Name (A-Z)</option>
          <option value="progress">Progress %</option>
          <option value="deadline">Deadline</option>
        </select>
      </div>

    </div>

    <!-- Category Filter chips -->
    <div class="flex flex-wrap gap-2 mt-4">
      <button *ngFor="let cat of categories" 
              class="px-3 py-1 text-sm font-medium rounded-full transition border focus:outline-none"
              [ngClass]="filters.category.includes(cat) ? 'bg-caramel-500 text-white border-caramel-500 shadow-sm' : 'bg-white text-gray-700 border-gray-300 hover:bg-caramel-50 hover:text-caramel-600'"
              (click)="toggleCategory(cat)">
        {{cat}}
      </button>
    </div>
  </div>

  <!-- Content -->
  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-caramel-500"></div>
  </div>

  <div *ngIf="!loading && skills.length === 0" class="text-center bg-white dark:bg-dark-card p-12 rounded-xl shadow-sm border border-gray-100">
    <div class="flex justify-center mb-4 text-caramel-200">
      <svg class="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
      </svg>
    </div>
    <h3 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-2">No skills found</h3>
    <p class="text-gray-500 dark:text-gray-400 mb-6">Start by adding a new skill to track your progress.</p>
    <button (click)="router.navigate(['/skills/new'])" class="btn-primary">Add Your First Skill</button>
  </div>

  <div *ngIf="!loading && skills.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <app-skill-card *ngFor="let skill of skills" 
                    [skill]="skill"
                    (edit)="editSkill($event)"
                    (delete)="deleteSkill($event)">
    </app-skill-card>
  </div>
</div>
